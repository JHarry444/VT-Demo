<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">QA</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="../index.html">Home</a>

                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <h2>Application</h2>
        <p>Use RMB > inspect to open the <b>Application</b> tab.</p>

        <section>
            <div>
                <h3>Local Storage</h3>
                <label for="todoLS">Task:</label>
                <input type="text" id="todoLS" name="task">
                <button class="btn btn-primary" onclick="addToLocalStorage()">Add</button>
                <ul id="localStorageList"></ul>
            </div>
            <div>
                <h3>Session Storage</h3>
                <label for="todoSS">Task:</label>
                <input type="text" id="todoSS" name="task">
                <button class="btn btn-primary" onclick="addToSessionStorage()">Add</button>
                <ul id="sessionStorageList"></ul>
            </div>
        </section>
        <section>
            <h3>Login</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </section>
        <script src="./application.js"></script>
    </main>
</body>

</html>
